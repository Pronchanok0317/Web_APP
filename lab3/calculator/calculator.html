<!DOCTYPE html>
<html lang="en">

<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>


    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-image: url("img/bg_cal.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        input {
            font-size: 40px;
            width: 100%;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 15px;
            border: 1px solid rgb(211, 181, 120);
            background-color: rgba(255, 255, 255, 0.95);
            color: rgb(90, 70, 70);
        }

        .container {
            background-color: rgba(255, 255, 255, 0.85);
            width: 310px;
            height: 450px;
            padding: 40px;

            display: flex;
            flex-direction: column;
            justify-content: center;

            border-radius: 40px;
            box-shadow: 0 10px 35px rgba(186, 147, 96, .45);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(5, 45px);
            gap: 10px;
        }

        .equal_button {
            grid-column: span 2;
            background-color: rgb(206, 156, 118);
            border-radius: 15px;
            border: 1px solid rgb(211, 181, 120);
            color: white;
        }

        .operate_button {
            background-color: rgb(245, 214, 222);
            border-radius: 15px;
            border: 1px solid rgb(211, 181, 120);
            color: rgb(110, 84, 96);
        }

        button {
            background-color: rgb(255, 250, 252);
            border-radius: 15px;
            border: 1px solid rgb(211, 181, 120);
            color: rgb(110, 84, 96);
            cursor: pointer;
        }

        .c {
            background-color: rgb(193, 122, 150);
            color: white;
        }
    </style>
</head>


<body>
    <div class="container">
        <input type="text">
        <div class="buttons">
            <button class="operate_button">+</button>
            <button class="operate_button">-</button>
            <button class="operate_button">x</button>
            <button class="operate_button">/</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>0</button>
            <button>.</button>
            <button class="c">c</button>
            <button class="equal_button">=</button>
        </div>
    </div>

</body>

</html>
