<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
.card{
    width: 300px;
    margin: 30px auto;
    text-align: center;
    border: 2px solid #ddd;
}

.card img{
    width: 100%;
    height: 300px;
    object-fit: cover;
    display: block;
}

.card h1,
.card .title,
.card p{
    padding: 0 20px;
}

.title{
    color: gray;
    font-size: 18px;
    margin: 10px 0;
}

.contact{
    margin-top: 20px;
    background: black;
    color: white;
    width: 100%;
    height: 50px;

    display: flex;
    justify-content: center;
    align-items: center;
}
</style>
</head>

<body>

<div class="card">

    <img src="img/Profile.jpg" alt="Profile">

    <h1>Pronchanok Phoolaikaw</h1>

    <p class="title">Student</p>

    <p>Kasetsart University</p>

    <p class="contact">Contact</p>

</div>

</body>
</html>
