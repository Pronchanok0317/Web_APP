<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

.card{
    width: 380px;
    margin: 30px auto;
    text-align: center;
    background: #7b2cbf;
    border-radius: 20px;
    overflow: hidden;
    padding: 30px 20px;
    color: white;
}

.card img{
    width: 150px;
    height: 150px;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid white;
    display: block;
    margin: 0 auto 20px;
}

.card h1{
    margin-bottom: 10px;
}

.title{
    color: #e0e0e0;
    font-size: 18px;
    margin-bottom: 10px;
}

.contact{
    margin-top: 25px;
    background: white;       
    color: #7b2cbf;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

    <img src="../img/Profile.jpg" alt="Profile">

    <h1>Pronchanok Phoolaikaw</h1>

    <p class="title">Student</p>

    <p>Kasetsart University</p>

    <p class="contact">Message</p>

</div>

</body>
</html>
